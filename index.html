<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Top 10 · clean</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 12px;
            overflow: hidden;
            margin: 0;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0a0a0a;
            display: block;
        }

        .phone-frame {
            aspect-ratio: 9 / 16;
            width: 100%;
            max-width: 360px;
            background: transparent;
            padding: 20px 16px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            height: auto;
            z-index: 1;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 10px;
            margin-bottom: 8px;
            flex-shrink: 0;
            border-bottom: none;
        }

        .list-header h1 {
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.3px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 4px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
        }

        .list-header h1 .editable-title {
            cursor: text;
            outline: none;
            border-radius: 4px;
            padding: 0 4px;
            transition: background 0.15s ease;
            background: transparent;
        }

        .list-header h1 .editable-title:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .list-header h1 .editable-title:focus {
            background: rgba(255, 255, 255, 0.06);
            outline: none;
        }

        .list-header h1 span {
          
          
            font-size: 15px;
   
         
            letter-spacing: 0.2px;
         
            
        }

        .badge-date {
            font-size: 13px;
            font-weight: 450;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 0.2px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: text;
            outline: none;
            transition: background 0.15s ease;
        }

        .badge-date:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .badge-date:focus {
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        .top-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-top: 2px;
            overflow: hidden;
            justify-content: space-evenly;
            min-height: 0;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 16px;
            padding: 6px 12px 6px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.15s ease;
            will-change: transform, opacity;
            transform: translateY(-60px);
            opacity: 0;
            flex: 1;
            min-height: 0;
            position: relative;
        }

        @keyframes dropIn {
            0% {
                transform: translateY(-60px);
                opacity: 0;
            }
            55% {
                transform: translateY(6px);
                opacity: 1;
            }
            75% {
                transform: translateY(-2px);
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .list-item.animate-drop {
            animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .rank-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .rank {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 26px;
            color: rgba(255, 255, 255, 0.9);
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            letter-spacing: -0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .rank:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        .rank .flag-emoji {
            font-size: 28px;
            line-height: 1;
        }

        .rank .rank-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 40px;
        }

        .item-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .item-title {
            font-weight: 600;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: -0.2px;
            line-height: 1.2;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            cursor: text;
            outline: none;
            border-radius: 4px;
            padding: 0 4px;
            transition: background 0.15s ease;
            background: transparent;
        }

        .item-title:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .item-title:focus {
            background: rgba(255, 255, 255, 0.06);
            outline: none;
        }

        .item-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 450;
            letter-spacing: 0.1px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
            cursor: text;
            outline: none;
            border-radius: 4px;
            padding: 0 4px;
            transition: background 0.15s ease;
            background: transparent;
        }

        .item-sub:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .item-sub:focus {
            background: rgba(255, 255, 255, 0.06);
            outline: none;
        }

        .trend-icon {
            font-size: 16px;
            opacity: 0.2;
            padding-left: 4px;
            color: rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
        }

        /* ===== FULL SCREEN FLAG OVERLAY ===== */
        .flag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 30px 16px;
            animation: fadeIn 0.2s ease;
        }

        .flag-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .flag-overlay-content {
            background: rgba(16, 16, 24, 0.95);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 16px 16px;
            width: 100%;
            max-width: 400px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .flag-overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 10px;
            flex-shrink: 0;
            gap: 10px;
        }

        .flag-overlay-header h2 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
        }

        .flag-overlay-header .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .flag-overlay-close {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            width: 32px;
            height: 32px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .flag-overlay-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .flag-search {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.15s ease;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .flag-search::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .flag-search:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        .flag-grid-container {
            flex: 1;
            overflow-y: auto;
            padding: 2px;
            min-height: 0;
        }

        .flag-grid-container::-webkit-scrollbar {
            width: 4px;
        }
        .flag-grid-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .flag-grid-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .flag-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .flag-grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding: 8px 2px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.12s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            min-height: 56px;
            justify-content: center;
        }

        .flag-grid-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
            transform: scale(1.04);
        }

        .flag-grid-item .flag-emoji-lg {
            font-size: 30px;
            line-height: 1.2;
        }

        .flag-grid-item .flag-country-sm {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .flag-grid-item.hidden {
            display: none;
        }

        .flag-overlay-footer {
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .flag-overlay-footer .hint {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
        }

        .reset-number-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .reset-number-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .reset-number-btn:active {
            transform: scale(0.95);
        }

        .upload-image-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .upload-image-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .upload-image-btn:active {
            transform: scale(0.95);
        }

        #imageUploadInput {
            display: none;
        }

        @media (max-width: 420px) {
            .phone-frame {
                padding: 16px 12px 12px;
            }
            .list-header h1 {
                font-size: 20px;
            }
            .badge-date {
                font-size: 11px;
                padding: 2px 10px;
            }
            .rank {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }
            .rank .flag-emoji {
                font-size: 24px;
            }
            .item-title {
                font-size: 16px;
            }
            .item-sub {
                font-size: 12px;
            }
            .trend-icon {
                font-size: 14px;
            }
            .list-item {
                padding: 5px 10px 5px 12px;
                gap: 10px;
                border-radius: 14px;
            }
            .top-list {
                gap: 4px;
            }
            .flag-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 3px;
            }
            .flag-grid-item .flag-emoji-lg {
                font-size: 26px;
            }
            .flag-grid-item .flag-country-sm {
                font-size: 7px;
            }
            .flag-overlay-content {
                padding: 16px 12px;
                max-width: 100%;
                max-height: 90vh;
            }
            .flag-overlay {
                padding: 20px 12px;
            }
            .upload-image-btn {
                font-size: 9px;
                padding: 3px 10px;
            }
        }

        @media (max-height: 700px) {
            .phone-frame {
                padding: 12px 10px 10px;
            }
            .list-header {
                padding-bottom: 6px;
                margin-bottom: 4px;
            }
            .list-header h1 {
                font-size: 18px;
            }
            .rank {
                width: 34px;
                height: 34px;
                font-size: 18px;
            }
            .rank .flag-emoji {
                font-size: 20px;
            }
            .item-title {
                font-size: 14px;
            }
            .item-sub {
                font-size: 11px;
            }
            .trend-icon {
                font-size: 12px;
            }
            .list-item {
                padding: 4px 8px 4px 10px;
                border-radius: 12px;
                gap: 8px;
            }
            .top-list {
                gap: 3px;
            }
            .flag-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 2px;
            }
            .flag-grid-item .flag-emoji-lg {
                font-size: 22px;
            }
            .flag-grid-item .flag-country-sm {
                font-size: 7px;
            }
            .flag-grid-item {
                padding: 5px 2px;
                min-height: 44px;
            }
            .flag-overlay-content {
                padding: 12px 10px;
                max-height: 90vh;
            }
            .flag-overlay-header h2 {
                font-size: 15px;
            }
            .flag-search {
                padding: 6px 10px;
                font-size: 12px;
                margin-bottom: 6px;
            }
            .flag-overlay-footer .hint {
                font-size: 8px;
            }
            .reset-number-btn {
                font-size: 9px;
                padding: 2px 10px;
            }
            .upload-image-btn {
                font-size: 9px;
                padding: 2px 10px;
            }
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .top-list::-webkit-scrollbar {
            display: none;
        }
        .top-list {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <!-- FULL SCREEN FLAG OVERLAY -->
    <div class="flag-overlay" id="flagOverlay">
        <div class="flag-overlay-content">
            <div class="flag-overlay-header">
                <h2>🏳️ Choose a Flag</h2>
                <div class="header-actions">
                    <button class="upload-image-btn" id="uploadImageBtn">🖼️ image</button>
                    <button class="reset-number-btn" id="resetNumberBtn">↺ number</button>
                    <button class="flag-overlay-close" id="flagOverlayClose">✕</button>
                </div>
            </div>
            <input class="flag-search" id="flagSearch" type="text" placeholder="Search country or territory..." />
            <div class="flag-grid-container">
                <div class="flag-grid" id="flagGrid"></div>
            </div>
            <div class="flag-overlay-footer">
                <span class="hint">tap a flag or upload image · tap "number" to revert</span>
                <span class="hint" id="flagCount">0 flags</span>
            </div>
        </div>
    </div>

    <input type="file" id="imageUploadInput" accept="image/*" />

    <div class="phone-frame" id="phoneFrame">
        <div class="list-header">
            <h1>
                <span class="editable-title" contenteditable="true" spellcheck="false">TOP 10</span>
                <span>🟡</span>
            </h1>
            <div class="badge-date" contenteditable="true" spellcheck="false">today</div>
        </div>

        <div class="top-list" id="topList"></div>
    </div>

    <script>
        // ===== WHITE PARTICLE SYSTEM =====
        (function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 100;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            function createParticle() {
                return {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    radius: 1.5 + Math.random() * 3,
                    opacity: 0.4 + Math.random() * 0.6
                };
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(createParticle());
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 * (1 - dist / 140)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                for (const p of particles) {
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 5);
                    grad.addColorStop(0, `rgba(255, 255, 255, ${p.opacity * 0.3})`);
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 5, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity * 0.6})`;
                    ctx.fill();
                }

                for (const p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                }

                requestAnimationFrame(drawParticles);
            }

            window.addEventListener('resize', () => {
                resize();
                for (const p of particles) {
                    p.x = Math.min(p.x, width);
                    p.y = Math.min(p.y, height);
                }
            });

            resize();
            initParticles();
            drawParticles();
        })();

        // ===== TRIPLE TAP RESET =====
        (function initTripleTapReset() {
            const phoneFrame = document.getElementById('phoneFrame');
            let tapCount = 0;
            let tapTimer = null;
            const listContainer = document.getElementById('topList');

            phoneFrame.addEventListener('click', (e) => {
                // Ignore clicks on interactive elements
                if (e.target.closest('.rank') || e.target.closest('.flag-overlay') || 
                    e.target.closest('.badge-date') || e.target.closest('.editable-title') ||
                    e.target.closest('.item-title') || e.target.closest('.item-sub') ||
                    e.target.closest('button')) {
                    return;
                }

                tapCount++;
                clearTimeout(tapTimer);

                if (tapCount === 1) {
                    // Triple tap detected - reset animation
                    resetDropAnimation();
                    tapCount = 0;
                } else {
                    tapTimer = setTimeout(() => {
                        tapCount = 0;
                    }, 500);
                }
            });

            function resetDropAnimation() {
                const items = listContainer.querySelectorAll('.list-item');
                // Remove animation classes
                items.forEach(item => {
                    item.classList.remove('animate-drop');
                    item.style.animation = 'none';
                    item.style.transform = 'translateY(-60px)';
                    item.style.opacity = '0';
                });

                // Force reflow
                void listContainer.offsetHeight;

                // Re-apply with stagger
                items.forEach((item, index) => {
                    const delay = (9 - index) * 1000;
                    setTimeout(() => {
                        item.style.animation = '';
                        item.classList.add('animate-drop');
                    }, delay + 200);
                });
            }
        })();

        // ===== COMPLETE FLAG LIBRARY =====
        const flagData = [
            { emoji: '🇺🇸', country: 'United States' },
            { emoji: '🇬🇧', country: 'United Kingdom' },
            { emoji: '🇫🇷', country: 'France' },
            { emoji: '🇩🇪', country: 'Germany' },
            { emoji: '🇮🇹', country: 'Italy' },

        flagData.sort((a, b) => a.country.localeCompare(b.country));

        // ===== FLAG OVERLAY =====
        const overlay = document.getElementById('flagOverlay');
        const overlayClose = document.getElementById('flagOverlayClose');
        const flagGrid = document.getElementById('flagGrid');
        const flagSearch = document.getElementById('flagSearch');
        const flagCount = document.getElementById('flagCount');
        const resetBtn = document.getElementById('resetNumberBtn');
        const uploadBtn = document.getElementById('uploadImageBtn');
        const fileInput = document.getElementById('imageUploadInput');
        let activeRankElement = null;

        function renderFlags(filter = '') {
            flagGrid.innerHTML = '';
            let visibleCount = 0;
            const searchTerm = filter.toLowerCase().trim();

            flagData.forEach(flag => {
                const item = document.createElement('div');
                item.className = 'flag-grid-item';

                const emoji = document.createElement('div');
                emoji.className = 'flag-emoji-lg';
                emoji.textContent = flag.emoji;

                const label = document.createElement('div');
                label.className = 'flag-country-sm';
                label.textContent = flag.country;

                item.appendChild(emoji);
                item.appendChild(label);

                const match = flag.country.toLowerCase().includes(searchTerm) ||
                             flag.emoji === searchTerm ||
                             searchTerm === '';
                if (!match && searchTerm !== '') {
                    item.classList.add('hidden');
                } else {
                    visibleCount++;
                }

                item.addEventListener('click', () => {
                    if (activeRankElement) {
                        setRankToFlag(activeRankElement, flag.emoji);
                        closeFlagOverlay();
                    }
                });

                flagGrid.appendChild(item);
            });

            flagCount.textContent = `${visibleCount} flags`;
        }

        function setRankToFlag(element, emoji) {
            element.innerHTML = '';
            const flagEmoji = document.createElement('span');
            flagEmoji.className = 'flag-emoji';
            flagEmoji.textContent = emoji;
            element.appendChild(flagEmoji);
            element.dataset.hasFlag = 'true';
            element.dataset.flag = emoji;
            element.dataset.type = 'flag';
        }

        function setRankToImage(element, imageUrl) {
            element.innerHTML = '';
            const img = document.createElement('img');
            img.className = 'rank-image';
            img.src = imageUrl;
            img.alt = 'custom';
            element.appendChild(img);
            element.dataset.hasFlag = 'true';
            element.dataset.type = 'image';
            element.dataset.imageUrl = imageUrl;
        }

        function resetRankToNumber(element) {
            element.innerHTML = element.dataset.rank;
            element.dataset.hasFlag = 'false';
            delete element.dataset.flag;
            delete element.dataset.country;
            delete element.dataset.type;
            delete element.dataset.imageUrl;
        }

        function openFlagOverlay(rankElement) {
            activeRankElement = rankElement;
            overlay.classList.add('show');
            flagSearch.value = '';
            renderFlags('');
            setTimeout(() => flagSearch.focus(), 100);
        }

        function closeFlagOverlay() {
            overlay.classList.remove('show');
            activeRankElement = null;
            flagSearch.value = '';
            renderFlags('');
        }

        function resetNumber() {
            if (activeRankElement) {
                resetRankToNumber(activeRankElement);
                closeFlagOverlay();
            }
        }

        function triggerUpload() {
            fileInput.click();
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && activeRankElement) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    setRankToImage(activeRankElement, event.target.result);
                    closeFlagOverlay();
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            }
        });

        flagSearch.addEventListener('input', (e) => {
            renderFlags(e.target.value);
        });

        resetBtn.addEventListener('click', resetNumber);
        uploadBtn.addEventListener('click', triggerUpload);
        overlayClose.addEventListener('click', closeFlagOverlay);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeFlagOverlay();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeFlagOverlay();
        });

            const itemsData = [
                { rank: 1, title: 'LUMINA X1', subtitle: 'flagship · 4.8' },

                { rank: 3, title: 'EDGE PRO', subtitle: 'workstation · 4.6' },

                { rank: 5, title: 'VENTUS G', subtitle: 'gaming · 4.4' },
                { rank: 6, title: 'SPECTRUM 7', subtitle: 'creator · 4.3' },
                { rank: 7, title: 'IONIC 5G', subtitle: 'connect · 4.2' },
                { rank: 8, title: 'FORGE X', subtitle: 'rugged · 4.1' },
                { rank: 9, title: 'ZEN DUAL', subtitle: 'hybrid · 4.0' },
                { rank: 10, title: 'VIBE CORE', subtitle: 'essential · 3.9' }
            ];

            const listContainer = document.getElementById('topList');
            if (!listContainer) return;

            listContainer.innerHTML = '';

            itemsData.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'list-item';

                const rankWrapper = document.createElement('div');
                rankWrapper.className = 'rank-wrapper';

                const rankSpan = document.createElement('span');
                rankSpan.className = 'rank';
                rankSpan.textContent = item.rank;
                rankSpan.dataset.rank = item.rank;
                rankSpan.dataset.hasFlag = 'false';

                rankSpan.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openFlagOverlay(rankSpan);
                });

                rankWrapper.appendChild(rankSpan);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'item-content';

                const titleSpan = document.createElement('div');
                titleSpan.className = 'item-title';
                titleSpan.textContent = item.title;
                titleSpan.contentEditable = 'true';
                titleSpan.spellcheck = false;

                const subSpan = document.createElement('div');
                subSpan.className = 'item-sub';
                subSpan.textContent = item.subtitle;
                subSpan.contentEditable = 'true';
                subSpan.spellcheck = false;

                contentDiv.appendChild(titleSpan);
                contentDiv.appendChild(subSpan);

                const trend = document.createElement('span');
                trend.className = 'trend-icon';
                trend.textContent = '↗';

                itemDiv.appendChild(rankWrapper);
                itemDiv.appendChild(contentDiv);
                itemDiv.appendChild(trend);

                listContainer.appendChild(itemDiv);

                const delay = (9 - index) * 1000;
                setTimeout(() => {
                    itemDiv.classList.add('animate-drop');
                }, delay + 200);
            });
        })();
