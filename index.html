<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Top 10 · editable</title>
    <link href="https://fonts.googleapis.com/css2?family=Product+Sans&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Product Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 12px;
            overflow: hidden;
            margin: 0;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0a0a0a;
            display: block;
        }

        .phone-frame {
            aspect-ratio: 9 / 16;
            width: 100%;
            max-width: 400px;
            background: transparent;
            padding: 16px 12px 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            height: auto;
            z-index: 1;
            min-height: 0;
        }

        /* ===== INTRO OVERLAY ===== */
        .intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            border-radius: inherit;
            pointer-events: none;
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 1;
            transform: scale(1);
            padding: 20px;
        }

        .intro-overlay.hide {
            opacity: 0;
            transform: scale(1.02);
            pointer-events: none;
        }

        .intro-box {
            text-align: center;
            max-width: 320px;
            padding: 22px 20px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            position: relative;
        }

        .intro-box .paper-clip {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(20px, 3.5vw, 30px);
            filter: drop-shadow(0 6px 18px rgba(255, 215, 0, 0.3));
            line-height: 1;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .intro-box .intro-title {
            font-size: clamp(20px, 4.2vw, 32px);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 30px rgba(180, 130, 70, 0.2);
            line-height: 1.3;
text-transform: lowercase;
            text-align: left;
        }

        /* ---- header ---- */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 6px;
            margin-bottom: 4px;
            flex-shrink: 0;
            border-bottom: none;
            min-height: 32px;
        }

        .list-header h1 {
            font-weight: 600;
            font-size: clamp(16px, 2.8vw, 22px);
            letter-spacing: -0.3px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 4px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .list-header h1 .title-text {
            cursor: default;
            padding: 0 4px;
            background: transparent;
        }

        .list-header h1 span {
            font-size: clamp(12px, 2vw, 18px);
            letter-spacing: 0.2px;
        }

        .badge-date {
            font-size: clamp(9px, 1.5vw, 13px);
            font-weight: 450;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.2px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: default;
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        /* ---- top list ---- */
        .top-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0;
            overflow: hidden;
            justify-content: space-evenly;
            min-height: 0;
            flex: 1 1 auto;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: clamp(10px, 1.5vw, 16px);
            padding: clamp(4px, 0.6vh, 7px) clamp(8px, 1.5vw, 14px) clamp(4px, 0.6vh, 7px) clamp(10px, 1.8vw, 16px);
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 14px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.15s ease;
            will-change: transform, opacity;
            transform: translateY(-60px);
            opacity: 0;
            flex: 1;
            min-height: 0;
            position: relative;
            overflow: hidden;
            font-family: 'Product Sans', 'Inter', sans-serif;
            cursor: default;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.06);
        }

        /* Flag background - zoomed and centered, separate from numbering */
        .list-item .flag-overlay-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.2);
            font-size: clamp(150px, 30vw, 280px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            letter-spacing: 0;
            line-height: 1;
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .list-item .flag-overlay-bg + * {
            position: relative;
            z-index: 1;
        }

        .list-item .rank-wrapper,
        .list-item .item-content,
        .list-item .trend-icon {
            position: relative;
            z-index: 1;
        }

        @keyframes dropIn {
            0% {
                transform: translateY(-60px);
                opacity: 0;
            }
            55% {
                transform: translateY(6px);
                opacity: 1;
            }
            75% {
                transform: translateY(-2px);
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes textFlip {
            0% { transform: rotateX(0deg); opacity: 0.3; }
            20% { transform: rotateX(90deg); opacity: 0.6; }
            40% { transform: rotateX(180deg); opacity: 0.9; }
            60% { transform: rotateX(270deg); opacity: 1; }
            80% { transform: rotateX(360deg); opacity: 1; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        @keyframes numberCount {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .list-item.animate-drop {
            animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .list-item .item-title.flipping {
            animation: textFlip 0.3s ease-in-out 3;
        }

        .list-item .rank.counting {
            animation: numberCount 0.8s ease-out forwards;
        }

        .rank-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: clamp(34px, 5.5vw, 48px);
            height: clamp(34px, 5.5vw, 48px);
            z-index: 1;
            cursor: pointer;
        }

        .rank {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: clamp(16px, 2.8vw, 24px);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            letter-spacing: -0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .rank:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        .rank .flag-emoji {
            font-size: clamp(18px, 3vw, 28px);
            line-height: 1;
        }

        .rank .rank-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .item-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
            padding: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: auto;
            cursor: text;
        }

        .item-title, .item-sub {
            font-family: 'Product Sans', 'Inter', sans-serif;
            cursor: text;
            outline: none;
            border: none;
            background: transparent;
            padding: 0 4px;
            transition: background 0.1s ease;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-title {
            font-weight: 600;
            font-size: clamp(12px, 2vw, 17px);
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: -0.2px;
            line-height: 1.2;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        }

        .item-sub {
            font-size: clamp(9px, 1.4vw, 13px);
            color: rgba(255, 255, 255, 0.4);
            font-weight: 450;
            letter-spacing: 0.1px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
        }

        .item-title:focus, .item-sub:focus {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .item-title::selection, .item-sub::selection {
            background: rgba(255, 255, 255, 0.1);
        }

        .trend-icon {
            font-size: clamp(11px, 1.6vw, 15px);
            opacity: 0.2;
            padding-left: 4px;
            color: rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== FULL SCREEN FLAG OVERLAY ===== */
        .flag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: clamp(20px, 4vh, 40px) clamp(12px, 2vw, 24px);
            animation: fadeIn 0.2s ease;
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .flag-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .flag-overlay-content {
            background: rgba(16, 16, 24, 0.95);
            border-radius: clamp(16px, 2.5vw, 24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: clamp(14px, 2vw, 20px) clamp(12px, 1.8vw, 16px) clamp(12px, 1.8vw, 16px);
            width: 100%;
            max-width: clamp(320px, 50vw, 420px);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .flag-overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: clamp(8px, 1.2vw, 12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: clamp(6px, 1vw, 10px);
            flex-shrink: 0;
            gap: clamp(6px, 1vw, 10px);
        }

        .flag-overlay-header h2 {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(14px, 2.2vw, 18px);
            font-weight: 600;
            white-space: nowrap;
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .flag-overlay-header .header-actions {
            display: flex;
            gap: clamp(4px, 0.6vw, 8px);
            align-items: center;
        }

        .flag-overlay-close {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            width: clamp(28px, 4vw, 34px);
            height: clamp(28px, 4vw, 34px);
            border-radius: 50%;
            font-size: clamp(14px, 2vw, 18px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .flag-overlay-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .flag-search {
            width: 100%;
            padding: clamp(6px, 1vw, 10px) clamp(10px, 1.5vw, 14px);
            border-radius: clamp(10px, 1.5vw, 12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.85);
            font-size: clamp(12px, 1.6vw, 14px);
            font-family: 'Product Sans', 'Inter', sans-serif;
            outline: none;
            transition: all 0.15s ease;
            margin-bottom: clamp(6px, 1vw, 10px);
            flex-shrink: 0;
        }

        .flag-search::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .flag-search:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        .flag-grid-container {
            flex: 1;
            overflow-y: auto;
            padding: 2px;
            min-height: 0;
        }

        .flag-grid-container::-webkit-scrollbar {
            width: 4px;
        }
        .flag-grid-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .flag-grid-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .flag-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(3px, 0.5vw, 6px);
        }

        .flag-grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding: clamp(4px, 0.8vw, 8px) 2px;
            border-radius: clamp(8px, 1.2vw, 12px);
            cursor: pointer;
            transition: all 0.12s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            min-height: clamp(40px, 6vw, 56px);
            justify-content: center;
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .flag-grid-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
            transform: scale(1.04);
        }

        .flag-grid-item .flag-emoji-lg {
            font-size: clamp(22px, 4vw, 30px);
            line-height: 1.2;
        }

        .flag-grid-item .flag-country-sm {
            font-size: clamp(6px, 1vw, 9px);
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .flag-grid-item.hidden {
            display: none;
        }

        .flag-overlay-footer {
            padding-top: clamp(8px, 1.2vw, 12px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: clamp(6px, 1vw, 10px);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .flag-overlay-footer .hint {
            font-size: clamp(8px, 1vw, 10px);
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .reset-number-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: clamp(3px, 0.5vw, 5px) clamp(10px, 1.5vw, 14px);
            border-radius: 30px;
            font-size: clamp(9px, 1.2vw, 11px);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Product Sans', 'Inter', sans-serif;
        }

        .reset-number-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .reset-number-btn:active {
            transform: scale(0.95);
        }

        .upload-image-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: clamp(3px, 0.5vw, 5px) clamp(8px, 1.2vw, 12px);
            border-radius: 30px;
            font-size: clamp(9px, 1.2vw, 11px);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Product Sans', 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .upload-image-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .upload-image-btn:active {
            transform: scale(0.95);
        }

        #imageUploadInput {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 768px) {
            .phone-frame {
                max-width: 420px;
                padding: 20px 18px 16px;
            }
            .rank-wrapper {
                width: 50px;
                height: 50px;
            }
            .rank {
                font-size: 26px;
            }
            .rank .flag-emoji {
                font-size: 30px;
            }
            .item-title {
                font-size: 19px;
            }
            .item-sub {
                font-size: 14px;
            }
            .list-item {
                padding: 6px 16px 6px 18px;
                gap: 16px;
                border-radius: 18px;
            }
            .top-list {
                gap: 5px;
            }
            .list-header h1 {
                font-size: 24px;
            }
            .badge-date {
                font-size: 13px;
                padding: 4px 14px;
            }
            .intro-box .paper-clip {
                font-size: 32px;
                top: -14px;
            }
            .list-item .flag-overlay-bg {
                font-size: clamp(180px, 30vw, 320px);
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @media (max-width: 360px) {
            .phone-frame {
                padding: 10px 6px 6px;
            }
            .rank-wrapper {
                width: 28px;
                height: 28px;
            }
            .rank {
                font-size: 13px;
            }
            .rank .flag-emoji {
                font-size: 14px;
            }
            .item-title {
                font-size: 10px;
            }
            .item-sub {
                font-size: 8px;
            }
            .list-item {
                padding: 3px 5px 3px 6px;
                gap: 5px;
                border-radius: 8px;
            }
            .top-list {
                gap: 2px;
            }
            .list-header h1 {
                font-size: 14px;
            }
            .badge-date {
                font-size: 8px;
                padding: 1px 6px;
            }
            .trend-icon {
                font-size: 9px;
                padding-left: 2px;
            }
            .flag-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .intro-box .paper-clip {
                font-size: 18px;
                top: -8px;
            }
            .list-item .flag-overlay-bg {
                font-size: clamp(80px, 20vw, 140px);
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @media (max-height: 640px) {
            .phone-frame {
                padding: 8px 8px 4px;
            }
            .list-header {
                padding-bottom: 3px;
                margin-bottom: 2px;
                min-height: 24px;
            }
            .list-header h1 {
                font-size: 14px;
            }
            .rank-wrapper {
                width: 26px;
                height: 26px;
            }
            .rank {
                font-size: 12px;
            }
            .rank .flag-emoji {
                font-size: 13px;
            }
            .item-title {
                font-size: 10px;
            }
            .item-sub {
                font-size: 8px;
            }
            .list-item {
                padding: 2px 5px 2px 6px;
                gap: 5px;
                border-radius: 8px;
            }
            .top-list {
                gap: 2px;
            }
            .badge-date {
                font-size: 8px;
                padding: 1px 6px;
            }
            .trend-icon {
                font-size: 9px;
                padding-left: 2px;
            }
            .intro-box .paper-clip {
                font-size: 18px;
                top: -8px;
            }
            .list-item .flag-overlay-bg {
                font-size: clamp(70px, 18vw, 120px);
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .top-list::-webkit-scrollbar {
            display: none;
        }
        .top-list {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <!-- FULL SCREEN FLAG OVERLAY -->
    <div class="flag-overlay" id="flagOverlay">
        <div class="flag-overlay-content">
            <div class="flag-overlay-header">
                <h2>🏳️ Choose a Flag</h2>
                <div class="header-actions">
                    <button class="upload-image-btn" id="uploadImageBtn">🖼️ image</button>
                    <button class="reset-number-btn" id="resetNumberBtn">↺ number</button>
                    <button class="flag-overlay-close" id="flagOverlayClose">✕</button>
                </div>
            </div>

        let typeAudio = null;

        function getTypeAudio() {
            if (!typeAudio) {

                typeAudio.volume = 0.3;
            }
            return typeAudio;
        }

        function unlockAudio() {
            if (audioUnlocked) return;
            const a = getTypeAudio();
            const playPromise = a.play();
            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        a.pause();
                        a.currentTime = 0;
                        audioUnlocked = true;
                    })
                    .catch(() => {});
            } else {
                audioUnlocked = true;
            }
        }

        ['pointerdown', 'touchstart', 'click', 'keydown'].forEach(evt => {
            document.addEventListener(evt, unlockAudio, { once: true, passive: true });
        });

        function playTypeSound() {
            const a = getTypeAudio();
            a.currentTime = 0;
            a.play().catch(e => console.log('Audio play failed:', e));
        }

        // ===== WHITE PARTICLE SYSTEM =====
        (function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 100;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            function createParticle() {
                return {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    radius: 1.5 + Math.random() * 3,
                    opacity: 0.4 + Math.random() * 0.6
                };
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(createParticle());
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 * (1 - dist / 140)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                for (const p of particles) {
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 5);
                    grad.addColorStop(0, `rgba(255, 255, 255, ${p.opacity * 0.3})`);
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 5, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity * 0.6})`;
                    ctx.fill();
                }

                for (const p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                }

                requestAnimationFrame(drawParticles);
            }

            window.addEventListener('resize', () => {
                resize();
                for (const p of particles) {
                    p.x = Math.min(p.x, width);
                    p.y = Math.min(p.y, height);
                }
            });

            resize();
            initParticles();
            drawParticles();
        })();

        // ===== TEXT FLIPPING AND NUMBER COUNTING =====
        function animateTextFlipping(titleElement) {
            const originalText = titleElement.textContent;
            const words = originalText.split(' ');
            const randomWords = [
                'LUMINA', 'AERO', 'EDGE', 'NOVA', 'VENTUS', 
                'SPECTRUM', 'IONIC', 'FORGE', 'ZEN', 'VIBE',
                'X1', '3S', 'PRO', 'SLIM', 'G', '7', '5G', 'X', 'DUAL', 'CORE'
            ];
            
            let flipCount = 0;
            const maxFlips = 6;
            
            titleElement.classList.add('flipping');
            
            const flipInterval = setInterval(() => {
                if (flipCount >= maxFlips) {
                    clearInterval(flipInterval);
                    titleElement.textContent = originalText;
                    titleElement.classList.remove('flipping');
                    return;
                }
                
                playTypeSound();
                
                const randomText = words.map(() => {
                    return randomWords[Math.floor(Math.random() * randomWords.length)];
                }).join(' ');
                
                titleElement.textContent = randomText;
                flipCount++;
            }, 100);
        }

        function animateNumberCounting(rankElement, targetNumber, preserveFlag = false) {
            // If preserveFlag is true and rank has a flag/image, don't overwrite it
            if (preserveFlag && rankElement.dataset.hasFlag === 'true') {
                // Just animate a scale effect on the existing content
                rankElement.classList.add('counting');
                setTimeout(() => {
                    rankElement.classList.remove('counting');
                }, 800);
                return;
            }

            rankElement.classList.add('counting');
            let current = 0;
            
            const countInterval = setInterval(() => {
                current++;
                if (current <= targetNumber) {
                    playTypeSound();
                    rankElement.textContent = current;
                } else {
                    clearInterval(countInterval);
                    rankElement.textContent = targetNumber;
                    rankElement.classList.remove('counting');
                }
            }, 50);
        }

        // ===== INTRO OVERLAY: hide after 1s, THEN start drops =====
        (function initIntroAndDrops() {
            const overlay = document.getElementById('introOverlay');
            const listContainer = document.getElementById('topList');
            if (!overlay || !listContainer) return;

            setTimeout(() => {
                overlay.classList.add('hide');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    startDropAnimation();
                }, 700);
            }, 1000);

            function startDropAnimation() {
                const items = listContainer.querySelectorAll('.list-item');
                
                items.forEach((item, index) => {
                    const delay = (9 - index) * 1000;
                    setTimeout(() => {
                        item.classList.add('animate-drop');
                        
                        const title = item.querySelector('.item-title');
                        if (title) {
                            setTimeout(() => {
                                animateTextFlipping(title);
                            }, 200);
                        }
                        
                        const rank = item.querySelector('.rank');
                        if (rank && rank.dataset.rank) {
                            const targetNumber = parseInt(rank.dataset.rank);
                            setTimeout(() => {
                                // Check if rank has a flag/image
                                const hasFlag = rank.dataset.hasFlag === 'true';
                                animateNumberCounting(rank, targetNumber, hasFlag);
                            }, 400);
                        }
                    }, delay + 200);
                });
            }
        })();

        // ===== DOUBLE TAP RESET - restarts from intro, preserving edits =====
        (function initDoubleTapReset() {
            const phoneFrame = document.getElementById('phoneFrame');
            const listContainer = document.getElementById('topList');
            const overlay = document.getElementById('introOverlay');
            let tapCount = 0;
            let tapTimer = null;

            // store current state before reset
            function preserveItemState(item) {
                const state = {};
                const title = item.querySelector('.item-title');
                const sub = item.querySelector('.item-sub');
                const rank = item.querySelector('.rank');
                const bg = item.querySelector('.flag-overlay-bg');
                
                if (title) state.title = title.textContent;
                if (sub) state.sub = sub.textContent;
                if (rank) {
                    state.rankText = rank.textContent;
                    state.hasFlag = rank.dataset.hasFlag === 'true';
                    state.flag = rank.dataset.flag;
                    state.type = rank.dataset.type;
                    state.imageUrl = rank.dataset.imageUrl;
                    state.rankNumber = rank.dataset.rank;
                }
                if (bg) state.bgFlag = bg.textContent;
                return state;
            }

            function restoreItemState(item, state) {
                const title = item.querySelector('.item-title');
                const sub = item.querySelector('.item-sub');
                const rank = item.querySelector('.rank');
                let bg = item.querySelector('.flag-overlay-bg');
                
                if (title && state.title) title.textContent = state.title;
                if (sub && state.sub) sub.textContent = state.sub;
                
                if (rank) {
                    // Restore the rank number in dataset
                    if (state.rankNumber) {
                        rank.dataset.rank = state.rankNumber;
                    }
                    
                    if (state.hasFlag) {
                        rank.dataset.hasFlag = 'true';
                        if (state.flag) {
                            rank.dataset.flag = state.flag;
                            rank.dataset.type = state.type || 'flag';
                            // re-render flag emoji or image
                            if (state.type === 'flag' && state.flag) {
                                rank.innerHTML = `<span class="flag-emoji">${state.flag}</span>`;
                            } else if (state.type === 'image' && state.imageUrl) {
                                rank.innerHTML = `<img class="rank-image" src="${state.imageUrl}" alt="custom" />`;
                            } else {
                                // fallback: just show the flag
                                rank.innerHTML = `<span class="flag-emoji">${state.flag || '🏳️'}</span>`;
                            }
                        }
                    } else {
                        rank.dataset.hasFlag = 'false';
                        delete rank.dataset.flag;
                        delete rank.dataset.type;
                        delete rank.dataset.imageUrl;
                        // Restore the number
                        rank.textContent = state.rankNumber || rank.dataset.rank;
                    }
                }
                
                if (state.bgFlag) {
                    if (!bg) {
                        bg = document.createElement('div');
                        bg.className = 'flag-overlay-bg';
                        item.appendChild(bg);
                    }
                    bg.textContent = state.bgFlag;
                } else if (bg) {
                    bg.remove();
                }
            }

            phoneFrame.addEventListener('click', (e) => {
                if (e.target.closest('.rank') || e.target.closest('.flag-overlay') ||
                    e.target.closest('.badge-date') || e.target.closest('.title-text') ||
                    e.target.closest('button') || e.target.closest('.intro-overlay') ||
                    e.target.closest('.paper-clip') || e.target.closest('.flag-search') ||
                    e.target.closest('.flag-grid-item') || e.target.closest('.flag-overlay-close') ||
                    e.target.closest('.reset-number-btn') || e.target.closest('.upload-image-btn') ||
                    e.target.closest('.item-title') || e.target.closest('.item-sub')) {
                    return;
                }

                tapCount++;

                if (tapCount === 1) {
                    tapTimer = setTimeout(() => {
                        tapCount = 0;
                    }, 500);
                } else if (tapCount === 2) {
                    clearTimeout(tapTimer);
                    tapCount = 0;
                    resetFromIntro();
                }
            });

            function resetFromIntro() {
                const items = listContainer.querySelectorAll('.list-item');
                
                // preserve state before reset
                const states = [];
                items.forEach(item => {
                    states.push(preserveItemState(item));
                });

                // reset animations
                items.forEach((item, index) => {
                    item.classList.remove('animate-drop');
                    item.style.animation = 'none';
                    item.style.transform = 'translateY(-60px)';
                    item.style.opacity = '0';
                    
                    const title = item.querySelector('.item-title');
                    if (title) {
                        title.classList.remove('flipping');
                    }
                    
                    const rank = item.querySelector('.rank');
                    if (rank) {
                        rank.classList.remove('counting');
                    }
                });

                void listContainer.offsetWidth;

                items.forEach(item => {
                    item.style.animation = '';
                });

                // show intro
                overlay.style.display = 'flex';
                overlay.classList.remove('hide');

                setTimeout(() => {
                    overlay.classList.add('hide');
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        startDropAnimation(states);
                    }, 700);
                }, 1000);
            }

            function startDropAnimation(states) {
                const items = listContainer.querySelectorAll('.list-item');
                
                items.forEach((item, index) => {
                    const delay = (9 - index) * 1000;
                    setTimeout(() => {
                        // restore state before animation
                        if (states && states[index]) {
                            restoreItemState(item, states[index]);
                        }
                        
                        item.classList.add('animate-drop');
                        
                        const title = item.querySelector('.item-title');
                        if (title) {
                            setTimeout(() => {
                                animateTextFlipping(title);
                            }, 200);
                        }
                        
                        const rank = item.querySelector('.rank');
                        if (rank && rank.dataset.rank) {
                            const targetNumber = parseInt(rank.dataset.rank);
                            setTimeout(() => {
                                const hasFlag = rank.dataset.hasFlag === 'true';
                                animateNumberCounting(rank, targetNumber, hasFlag);
                            }, 400);
                        }
                    }, delay + 200);
                });
            }
        })();

            { emoji: '🇬🇸', country: 'S. Georgia' },

            { emoji: '🇱🇨', country: 'St Lucia' },
            { emoji: '🇰🇳', country: 'St Kitts & Nevis' },
            { emoji: '🇦🇬', country: 'Antigua & Barbuda' },
            { emoji: '🇬🇩', country: 'Grenada' },
            { emoji: '🇩🇲', country: 'Dominica' }
        ];

        flagData.sort((a, b) => a.country.localeCompare(b.country));

        // ===== FLAG OVERLAY =====
        const overlay = document.getElementById('flagOverlay');
        const overlayClose = document.getElementById('flagOverlayClose');
        const flagGrid = document.getElementById('flagGrid');
        const flagSearch = document.getElementById('flagSearch');
        const flagCount = document.getElementById('flagCount');
        const resetBtn = document.getElementById('resetNumberBtn');
        const uploadBtn = document.getElementById('uploadImageBtn');
        const fileInput = document.getElementById('imageUploadInput');
        let activeItemElement = null;
        let activeRankElement = null;
        let activeMode = null;

        function renderFlags(filter = '') {
            flagGrid.innerHTML = '';
            let visibleCount = 0;
            const searchTerm = filter.toLowerCase().trim();

            flagData.forEach(flag => {
                const item = document.createElement('div');
                item.className = 'flag-grid-item';

                const emoji = document.createElement('div');
                emoji.className = 'flag-emoji-lg';
                emoji.textContent = flag.emoji;

                const label = document.createElement('div');
                label.className = 'flag-country-sm';
                label.textContent = flag.country;

                item.appendChild(emoji);
                item.appendChild(label);

                const match = flag.country.toLowerCase().includes(searchTerm) ||
                             flag.emoji === searchTerm ||
                             searchTerm === '';
                if (!match && searchTerm !== '') {
                    item.classList.add('hidden');
                } else {
                    visibleCount++;
                }

                item.addEventListener('click', () => {
                    if (activeMode === 'item' && activeItemElement) {
                        setFlagOnItem(activeItemElement, flag.emoji);
                        closeFlagOverlay();
                    } else if (activeMode === 'rank' && activeRankElement) {
                        setFlagOnRank(activeRankElement, flag.emoji);
                        closeFlagOverlay();
                    }
                });

                flagGrid.appendChild(item);
            });

            flagCount.textContent = `${visibleCount} flags`;
        }

        function setFlagOnItem(itemElement, emoji) {
            const existingBg = itemElement.querySelector('.flag-overlay-bg');
            if (existingBg) existingBg.remove();

            const bg = document.createElement('div');
            bg.className = 'flag-overlay-bg';
            bg.textContent = emoji;
            itemElement.appendChild(bg);
        }

        function setFlagOnRank(rankElement, emoji) {
            rankElement.innerHTML = '';
            const flagEmoji = document.createElement('span');
            flagEmoji.className = 'flag-emoji';
            flagEmoji.textContent = emoji;
            rankElement.appendChild(flagEmoji);
            rankElement.dataset.hasFlag = 'true';
            rankElement.dataset.flag = emoji;
            rankElement.dataset.type = 'flag';
        }

        function setRankToImage(element, imageUrl) {
            element.innerHTML = '';
            const img = document.createElement('img');
            img.className = 'rank-image';
            img.src = imageUrl;
            img.alt = 'custom';
            element.appendChild(img);
            element.dataset.hasFlag = 'true';
            element.dataset.type = 'image';
            element.dataset.imageUrl = imageUrl;
        }

        function resetRankToNumber(element) {
            element.innerHTML = element.dataset.rank;
            element.dataset.hasFlag = 'false';
            delete element.dataset.flag;
            delete element.dataset.country;
            delete element.dataset.type;
            delete element.dataset.imageUrl;
        }

        function resetFlagOnItem(itemElement) {
            const bg = itemElement.querySelector('.flag-overlay-bg');
            if (bg) bg.remove();
        }

        function openFlagOverlay(itemElement, rankElement, mode) {
            activeItemElement = itemElement;
            activeRankElement = rankElement;
            activeMode = mode;
            overlay.classList.add('show');
            flagSearch.value = '';
            renderFlags('');
            setTimeout(() => flagSearch.focus(), 100);
        }

        function closeFlagOverlay() {
            overlay.classList.remove('show');
            activeItemElement = null;
            activeRankElement = null;
            activeMode = null;
            flagSearch.value = '';
            renderFlags('');
        }

        function resetNumber() {
            if (activeMode === 'item' && activeItemElement) {
                resetFlagOnItem(activeItemElement);
                closeFlagOverlay();
            } else if (activeMode === 'rank' && activeRankElement) {
                resetRankToNumber(activeRankElement);
                closeFlagOverlay();
            }
        }

        function triggerUpload() {
            fileInput.click();
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && activeRankElement && activeMode === 'rank') {
                const reader = new FileReader();
                reader.onload = (event) => {
                    setRankToImage(activeRankElement, event.target.result);
                    closeFlagOverlay();
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            } else if (file && activeItemElement && activeMode === 'item') {
                closeFlagOverlay();
                fileInput.value = '';
            }
        });

        flagSearch.addEventListener('input', (e) => {
            renderFlags(e.target.value);
        });

        resetBtn.addEventListener('click', resetNumber);
        uploadBtn.addEventListener('click', triggerUpload);
        overlayClose.addEventListener('click', closeFlagOverlay);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeFlagOverlay();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeFlagOverlay();
        });

        // ===== TOP 10 LIST with inline editing =====
        (function initList() {
            const itemsData = [
                { rank: 1, title: 'LUMINA X1', subtitle: 'flagship · 4.8' },
                { rank: 2, title: 'AERO 3S', subtitle: 'ultralight · 4.7' },
                { rank: 3, title: 'EDGE PRO', subtitle: 'workstation · 4.6' },
                { rank: 4, title: 'NOVA SLIM', subtitle: 'compact · 4.5' },
                { rank: 5, title: 'VENTUS G', subtitle: 'gaming · 4.4' },
                { rank: 6, title: 'SPECTRUM 7', subtitle: 'creator · 4.3' },
                { rank: 7, title: 'IONIC 5G', subtitle: 'connect · 4.2' },
                { rank: 8, title: 'FORGE X', subtitle: 'rugged · 4.1' },
                { rank: 9, title: '92932', subtitle: 'hybrid · 4.0' },
                { rank: 10, title: 'VIBE CORE', subtitle: 'essential · 3.9' }
            ];

            const listContainer = document.getElementById('topList');
            if (!listContainer) return;

            listContainer.innerHTML = '';

            itemsData.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'list-item';

                const rankWrapper = document.createElement('div');
                rankWrapper.className = 'rank-wrapper';

                const rankSpan = document.createElement('span');
                rankSpan.className = 'rank';
                rankSpan.textContent = item.rank;
                rankSpan.dataset.rank = item.rank;
                rankSpan.dataset.hasFlag = 'false';

                rankWrapper.appendChild(rankSpan);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'item-content';

                const titleSpan = document.createElement('div');
                titleSpan.className = 'item-title';
                titleSpan.textContent = item.title;
                titleSpan.contentEditable = true;
                titleSpan.spellcheck = false;

                const subSpan = document.createElement('div');
                subSpan.className = 'item-sub';
                subSpan.textContent = item.subtitle;
                subSpan.contentEditable = true;
                subSpan.spellcheck = false;

                // Commit edit on blur or Enter
                [titleSpan, subSpan].forEach(el => {
                    el.addEventListener('blur', () => {
                        el.textContent = el.textContent.trim() || el.dataset.fallback || el.textContent;
                    });
                    el.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            el.blur();
                        }
                    });
                    // Store fallback
                    el.dataset.fallback = el.textContent;
                });

                contentDiv.appendChild(titleSpan);
                contentDiv.appendChild(subSpan);

                const trend = document.createElement('span');
                trend.className = 'trend-icon';
                trend.textContent = '↗';

                itemDiv.appendChild(rankWrapper);
                itemDiv.appendChild(contentDiv);
                itemDiv.appendChild(trend);

                // Click on item body (not rank, not editable text) opens flag overlay
                itemDiv.addEventListener('click', (e) => {
                    if (e.target.closest('.rank')) return;
                    if (e.target.closest('.item-title') || e.target.closest('.item-sub')) return;
                    e.stopPropagation();
                    openFlagOverlay(itemDiv, null, 'item');
                });

                rankSpan.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openFlagOverlay(null, rankSpan, 'rank');
                });

                listContainer.appendChild(itemDiv);

                itemDiv.style.opacity = '0';
                itemDiv.style.transform = 'translateY(-60px)';
            });
        })();
    </script>
