<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio visualizer · editable word</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* ----- reset & base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* ----- main container to keep visualizer fixed ----- */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 1rem 0;
            position: relative;
            z-index: 1;
        }

        /* ----- word container with fixed height to prevent shifting ----- */
        .word-container {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 2rem;
        }

        /* ----- main word – big, editable ----- */
        .giant-word {
            color: white;
            font-family: 'Roboto', sans-serif;
            font-size: clamp(2.8rem, 18vw, 7rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-align: center;
            line-height: 1.2;
            max-width: 95vw;
            word-break: break-word;
            text-shadow: none;
            transition: border-color 0.2s ease;
            cursor: text;
            outline: none;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 0.2rem 0.6rem;
            background: transparent;
            user-select: none;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInWord 0.8s ease forwards 1.2s;
        }

        @keyframes fadeInWord {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .giant-word.editing {
            user-select: text;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .giant-word:focus {
            user-select: text;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        /* ----- visualizer: centered vertically, FIXED position ----- */
        .viz-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            height: 80px;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            z-index: 2;
            opacity: 0;
            animation: fadeInWord 0.8s ease forwards 1.4s;
        }

        /* each bar: fully rounded (pill shape) - PURE WHITE with full opacity */
        .bar {
            width: 10px;
            height: 18px;
            background: white;
            border-radius: 9999px;
            transition: height 0.12s ease-out;
            box-shadow: none;
            transform: scaleY(1);
            transform-origin: center;
            will-change: height;
            flex-shrink: 0;
            pointer-events: none;
            opacity: 1 !important;
        }

        /* ----- INTRO "Pronounce" - SOLID WHITE ----- */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: black;
            pointer-events: none;
            animation: introFadeOut 0.8s ease forwards 1s;
        }

        @keyframes introFadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                pointer-events: none;
            }
        }

        .intro-text {
            font-family: 'Roboto', sans-serif;
            background: white;
            color: black;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            padding: 1.2rem 3.5rem;
            border: none;
            border-radius: 60px;
            box-shadow: none;
            letter-spacing: 0.05em;
            animation: introPulse 1s ease-in-out;
            cursor: default;
        }

        @keyframes introPulse {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }
            30% {
                transform: scale(1.05);
                opacity: 1;
            }
            60% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ----- OVERLAY - hidden by default ----- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        .overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ----- SUBSCRIBE BUTTON - SOLID WHITE ----- */
        .subscribe-btn {
            font-family: 'Roboto', sans-serif;
            background: white;
            color: black;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            padding: 1.2rem 3.5rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.2s ease;
            letter-spacing: 0.05em;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1000;
        }

        .subscribe-btn:hover {
            transform: scale(1.05);
        }

        .subscribe-btn:active {
            transform: scale(0.95);
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* responsive */
        @media (max-width: 500px) {
            .viz-row {
                gap: 6px;
                height: 60px;
            }
            .bar {
                width: 8px;
            }
            .word-container {
                min-height: 80px;
            }
            .giant-word {
                min-height: 60px;
                font-size: clamp(2rem, 12vw, 4rem);
            }
            .subscribe-btn {
                font-size: 1.3rem;
                padding: 0.9rem 2rem;
            }
            .intro-text {
                font-size: 1.3rem;
                padding: 0.9rem 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- INTRO "Pronounce" - SOLID WHITE -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-text">Pronounce</div>
    </div>

    <div class="main-wrapper">
        <!-- word with fixed container -->
        <div class="word-container">
            <div class="giant-word" id="wordDisplay" contenteditable="false" spellcheck="false">
                Pneumonoultramicroscopicsilicovolcanoconiosis
            </div>
        </div>

        <!-- 7‑bar visualizer - clickable -->
        <div class="viz-row" id="visualizer">
            <div class="bar" id="bar0"></div>
            <div class="bar" id="bar1"></div>
            <div class="bar" id="bar2"></div>
            <div class="bar" id="bar3"></div>
            <div class="bar" id="bar4"></div>
            <div class="bar" id="bar5"></div>
            <div class="bar" id="bar6"></div>
        </div>
    </div>

    <!-- OVERLAY with blur backdrop - no X button -->
    <div class="overlay" id="overlay">
        <button class="subscribe-btn" id="subscribeBtn">SUBSCRIBE</button>
    </div>

    <script>
        (function() {
            "use strict";

            // ----- DOM refs -----
            const bars = [
                document.getElementById('bar0'),
                document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3'),
                document.getElementById('bar4'),
                document.getElementById('bar5'),
                document.getElementById('bar6')
            ];
            const wordDisplay = document.getElementById('wordDisplay');
            const visualizer = document.getElementById('visualizer');
            const overlay = document.getElementById('overlay');
            const subscribeBtn = document.getElementById('subscribeBtn');
            const introOverlay = document.getElementById('introOverlay');

            // ========== LOCAL STORAGE: load saved word ==========
            const STORAGE_KEY = 'giant_word_text';
            function loadSavedWord() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved && saved.trim().length > 0) {
                        wordDisplay.textContent = saved.trim();
                    }
                } catch (e) {}
            }
            loadSavedWord();

            function saveWordToStorage() {
                try {
                    const text = wordDisplay.textContent.trim();
                    if (text.length > 0) {
                        localStorage.setItem(STORAGE_KEY, text);
                    } else {
                        const fallback = 'Pneumonoultramicroscopicsilicovolcanoconiosis';
                        wordDisplay.textContent = fallback;
                        localStorage.setItem(STORAGE_KEY, fallback);
                    }
                } catch (e) {}
            }

            // ----- audio context & analyser -----
            let audioContext = null;
            let analyser = null;
            let dataArray = null;
            let source = null;
            let mediaStream = null;
            let animationFrame = null;
            let isRunning = false;
            let isMicInitialized = false;

            // ----- bar height limits -----
            const BAR_MIN = 8;
            const BAR_MAX = 58;
            const SMOOTHING = 0.78;

            // ----- update bars (centered) - FULL WHITE, NO OPACITY VARIATION -----
            function updateBars() {
                if (!analyser) return;

                analyser.getByteFrequencyData(dataArray);

                const binCount = analyser.frequencyBinCount;
                const barCount = bars.length;
                const step = Math.floor(binCount / barCount);

                for (let i = 0; i < barCount; i++) {
                    let sum = 0;
                    let count = 0;
                    const start = i * step;
                    const end = (i === barCount - 1) ? binCount : start + step;
                    for (let j = start; j < end; j++) {
                        sum += dataArray[j] || 0;
                        count++;
                    }
                    let avg = count > 0 ? sum / count : 0;
                    const normalized = Math.min(1, avg / 200);
                    const eased = 1 - Math.pow(1 - normalized, 1.8);
                    let height = BAR_MIN + (BAR_MAX - BAR_MIN) * eased;
                    height = Math.min(BAR_MAX, Math.max(BAR_MIN, height));

                    if (bars[i]) {
                        bars[i].style.height = height + 'px';
                        bars[i].style.opacity = '1';
                    }
                }
            }

            // ----- animation loop -----
            function animate() {
                if (!isRunning) return;
                updateBars();
                animationFrame = requestAnimationFrame(animate);
            }

            // ----- start microphone with iOS fix -----
            async function startMicrophone() {
                try {
                    // iOS Safari requires getUserMedia to be called from user gesture
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { 
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        } 
                    });
                    
                    mediaStream = stream;
                    isMicInitialized = true;

                    // Create AudioContext (must be after user gesture on iOS)
                    if (!audioContext || audioContext.state === 'closed') {
                        audioContext = new(window.AudioContext || window.webkitAudioContext)();
                    }
                    
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }

                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                    analyser.smoothingTimeConstant = SMOOTHING;

                    source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);

                    dataArray = new Uint8Array(analyser.frequencyBinCount);

                    if (animationFrame) cancelAnimationFrame(animationFrame);
                    isRunning = true;
                    animate();
                    console.log('✅ Microphone is active!');
                    
                    sessionStorage.setItem('micPermissionGranted', 'true');
                    
                } catch (err) {
                    console.warn('❌ Mic error:', err);
                    isRunning = false;
                    isMicInitialized = false;
                    if (animationFrame) {
                        cancelAnimationFrame(animationFrame);
                        animationFrame = null;
                    }
                    bars.forEach(bar => {
                        if (bar) {
                            bar.style.height = BAR_MIN + 'px';
                            bar.style.opacity = '1';
                        }
                    });
                    
                    // On iOS, if permission is denied, we need a user gesture to retry
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        console.log('Permission denied. Will retry on user interaction.');
                        sessionStorage.removeItem('micPermissionGranted');
                        
                        // Show a simple tap prompt (using the intro overlay style)
                        const prompt = document.createElement('div');
                        prompt.style.cssText = `
                            position: fixed;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            background: rgba(0,0,0,0.95);
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            z-index: 2000;
                            flex-direction: column;
                            gap: 1rem;
                        `;
                        prompt.innerHTML = `
                            <div style="color:white;font-family:'Roboto',sans-serif;font-size:clamp(1.5rem,5vw,3rem);font-weight:700;text-align:center;animation:introPulse 1.5s ease-in-out infinite;">
                                🎤 Tap to Start
                            </div>
                            <div style="color:rgba(255,255,255,0.5);font-family:'Roboto',sans-serif;font-size:clamp(0.9rem,2vw,1.2rem);text-align:center;">
                                Microphone access is required
                            </div>
                        `;
                        document.body.appendChild(prompt);
                        
                        const retryHandler = async function() {
                            document.removeEventListener('click', retryHandler);
                            document.removeEventListener('touchstart', retryHandler);
                            if (prompt.parentNode) prompt.remove();
                            await startMicrophone();
                        };
                        document.addEventListener('click', retryHandler);
                        document.addEventListener('touchstart', retryHandler);
                    }
                }
            }

            async function resumeAudioContext() {
                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
            }

            async function tryAutoStart() {
                try {
                    // Check if we're on iOS
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                                 (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                    
                    if (isIOS) {
                        console.log('📱 iOS detected - waiting for user gesture');
                        // Show tap prompt using intro overlay style
                        const prompt = document.createElement('div');
                        prompt.style.cssText = `
                            position: fixed;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            background: rgba(0,0,0,0.95);
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            z-index: 2000;
                            flex-direction: column;
                            gap: 1rem;
                        `;
                        prompt.innerHTML = `
                            <div style="color:white;font-family:'Roboto',sans-serif;font-size:clamp(1.5rem,5vw,3rem);font-weight:700;text-align:center;animation:introPulse 1.5s ease-in-out infinite;">
                                🎤 Tap to Start
                            </div>
                            <div style="color:rgba(255,255,255,0.5);font-family:'Roboto',sans-serif;font-size:clamp(0.9rem,2vw,1.2rem);text-align:center;">
                                Microphone access is required for the visualizer
                            </div>
                        `;
                        document.body.appendChild(prompt);
                        
                        const startHandler = async function() {
                            document.removeEventListener('click', startHandler);
                            document.removeEventListener('touchstart', startHandler);
                            if (prompt.parentNode) prompt.remove();
                            await startMicrophone();
                        };
                        document.addEventListener('click', startHandler);
                        document.addEventListener('touchstart', startHandler);
                        return;
                    }
                    
                    const hasStoredPermission = sessionStorage.getItem('micPermissionGranted') === 'true';
                    if (hasStoredPermission) {
                        console.log('Stored permission found, attempting to start mic...');
                        await startMicrophone();
                    } else {
                        try {
                            const permissionStatus = await navigator.permissions.query({ name: 'microphone' });
                            if (permissionStatus.state === 'granted') {
                                console.log('Permission already granted, starting mic...');
                                await startMicrophone();
                                return;
                            }
                        } catch (e) {}
                        
                        console.log('Waiting for user interaction to start mic...');
                        const startOnInteraction = async function() {
                            document.removeEventListener('click', startOnInteraction);
                            document.removeEventListener('touchstart', startOnInteraction);
                            await startMicrophone();
                        };
                        document.addEventListener('click', startOnInteraction);
                        document.addEventListener('touchstart', startOnInteraction);
                    }
                } catch (err) {
                    console.log('Auto-start failed, waiting for user interaction:', err);
                    const startOnInteraction = async function() {
                        document.removeEventListener('click', startOnInteraction);
                        document.removeEventListener('touchstart', startOnInteraction);
                        await startMicrophone();
                    };
                    document.addEventListener('click', startOnInteraction);
                    document.addEventListener('touchstart', startOnInteraction);
                }
            }

            // ----- auto-start on load after intro -----
            setTimeout(() => {
                tryAutoStart();
            }, 1200);

            // ---- pre-set bars to minimum ----
            bars.forEach(bar => {
                if (bar) {
                    bar.style.height = BAR_MIN + 'px';
                    bar.style.opacity = '1';
                }
            });

            // ----- Resume audio on user interaction -----
            document.addEventListener('click', resumeAudioContext);
            document.addEventListener('touchstart', resumeAudioContext);

            // ----- DOUBLE CLICK / DOUBLE TAP to edit -----
            let clickTimer = null;
            let isEditing = false;

            function enableEditing() {
                if (isEditing) return;
                isEditing = true;
                wordDisplay.contentEditable = true;
                wordDisplay.classList.add('editing');
                wordDisplay.focus();

                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(wordDisplay);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function disableEditing() {
                if (!isEditing) return;
                isEditing = false;
                wordDisplay.contentEditable = false;
                wordDisplay.classList.remove('editing');
                wordDisplay.blur();
                saveWordToStorage();
            }

            // --- Desktop: double click ---
            wordDisplay.addEventListener('dblclick', function(e) {
                e.preventDefault();
                enableEditing();
            });

            // --- Mobile: double tap detection ---
            let lastTouchEnd = 0;
            let touchTimeout = null;

            wordDisplay.addEventListener('touchend', function(e) {
                const now = Date.now();
                const timeSince = now - lastTouchEnd;
                lastTouchEnd = now;

                if (timeSince < 350 && timeSince > 20) {
                    e.preventDefault();
                    if (touchTimeout) {
                        clearTimeout(touchTimeout);
                        touchTimeout = null;
                    }
                    enableEditing();
                } else {
                    if (touchTimeout) {
                        clearTimeout(touchTimeout);
                        touchTimeout = null;
                    }
                    touchTimeout = setTimeout(() => {
                        touchTimeout = null;
                    }, 400);
                }
            });

            // --- Blur / lose focus → disable editing ---
            wordDisplay.addEventListener('blur', function() {
                if (this.textContent.trim() === '') {
                    this.textContent = 'Pneumonoultramicroscopicsilicovolcanoconiosis';
                }
                disableEditing();
            });

            // --- Press Escape or Enter to stop editing ---
            wordDisplay.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' || e.key === 'Enter') {
                    this.blur();
                }
            });

            // =============================================
            // ----- CLICK VISUALIZER → SHOW OVERLAY -----
            // =============================================
            visualizer.addEventListener('click', function(e) {
                e.stopPropagation();
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });

            // ----- CLOSE OVERLAY by clicking outside the button -----
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            // ----- Press Escape to close -----
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            // ----- SUBSCRIBE BUTTON action -----
            subscribeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                alert('Thank you for subscribing!');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            });

            // --- Clean up on page unload ---
            window.addEventListener('beforeunload', () => {
                if (audioContext && audioContext.state !== 'closed') {
                    audioContext.close().catch(() => {});
                }
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                }
                if (touchTimeout) {
                    clearTimeout(touchTimeout);
                    touchTimeout = null;
                }
                saveWordToStorage();
            });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    saveWordToStorage();
                }
            });

            console.log('🎙️ iPad support: Tap the screen if prompted for microphone access.');
            console.log('💾 The giant word is saved to localStorage automatically.');
        })();
    </script>
</body>
</html>
